<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>狼人杀</title>
  <link rel="stylesheet" href="style.css?v=4">
</head>
<body>
  <div id="app">
    <!-- 左侧玩家列 -->
    <div id="players-left"></div>

    <!-- 右侧玩家列 -->
    <div id="players-right"></div>

    <!-- 头部状态栏 -->
    <header id="header">
      <span id="phase-info">等待玩家加入</span>
      <span id="day-count"></span>
      <span id="my-role" class="hidden"></span>
    </header>

    <!-- 板子信息面板 -->
    <div id="preset-panel" class="hidden">
      <div id="preset-panel-name"></div>
      <div id="preset-panel-roles"></div>
      <div id="preset-panel-rules"></div>
      <div id="preset-list"></div>
      <div id="preset-locked" class="hidden"></div>
      <div id="preset-locked-name"></div>
    </div>

    <!-- 主内容区 -->
    <div id="main-content">
      <!-- 等待房间 -->
      <div id="waiting-room">
        <div id="waiting-preset"></div>
        <div id="waiting-players"></div>
      </div>

      <!-- 消息区域 -->
      <section id="messages-section">
        <div id="messages"></div>
      </section>

      <!-- 操作区域 -->
      <section id="action-section">
        <div id="action-prompt"></div>
        <div id="spectator-view-bar" class="hidden">
          <button class="view-btn active" data-view="villager">村民</button>
          <button class="view-btn" data-view="werewolf">狼人</button>
          <button class="view-btn" data-view="god">上帝</button>
        </div>
        <div id="action-input">
          <input type="text" id="speech-input" placeholder="输入发言内容...">
          <button id="send-btn">发送</button>
          <button class="inline-btn join-game-btn hidden" id="join-game-btn">加入</button>
          <button class="inline-btn start-game-btn hidden" id="start-game-btn">开始游戏</button>
          <button class="inline-btn restart-btn hidden" id="restart-btn">返回房间</button>
        </div>
        <div id="vote-buttons"></div>
        <div id="skill-buttons"></div>
      </section>
    </div>

    <!-- 设置面板（首次输入名字） -->
    <div id="setup-panel" class="panel">
      <h2>🎭 欢愉杀</h2>
      <div class="form-group">
        <label>你的名字：</label>
        <input type="text" id="player-name" placeholder="输入名字" autofocus>
      </div>
      <div class="buttons">
        <button id="ready-btn">创建名字</button>
      </div>
    </div>
    <div id="speaker-art" class="hidden">
      <img src="" alt="">
    </div>

    <!-- 天黑请闭眼转场 -->
    <div id="night-transition" class="hidden">
      <div class="transition-bg"></div>
      <div class="transition-text">
        <div class="transition-col transition-left">
          <span class="transition-char" data-delay="0">天</span>
          <span class="transition-char" data-delay="1">黑</span>
        </div>
        <div class="transition-col transition-right">
          <span class="transition-char" data-delay="2">请</span>
          <span class="transition-char" data-delay="3">闭</span>
          <span class="transition-char" data-delay="4">眼</span>
        </div>
      </div>
    </div>

    <!-- AI 角色详情弹窗 -->
    <div id="profile-popup" class="hidden">
      <div id="profile-popup-overlay"></div>
      <div id="profile-popup-content">
        <img id="profile-popup-art" src="" alt="">
        <div id="profile-popup-info">
          <div id="profile-popup-name"></div>
          <div id="profile-popup-detail"></div>
        </div>
        <button id="profile-popup-close">✕</button>
      </div>
    </div>

    <!-- 消息模板 -->
    <template id="tpl-message">
      <div class="message">
        <div class="message-content"></div>
      </div>
    </template>

    <!-- 聊天消息模板 -->
    <template id="tpl-chat-message">
      <div class="chat-message">
        <img class="chat-avatar" src="/assets/masks/fools_mask.webp" alt="">
        <div class="chat-body">
          <div class="chat-name"></div>
          <div class="chat-bubble"></div>
        </div>
      </div>
    </template>

    <!-- 阶段分割线模板 -->
    <template id="tpl-phase-divider">
      <div class="phase-divider">
        <span></span>
      </div>
    </template>

    <!-- 游戏简讯分割线模板 -->
    <template id="tpl-game-brief">
      <div class="game-brief-divider">
        <div class="game-brief-line"></div>
        <div class="game-brief-content"></div>
        <div class="game-brief-line"></div>
      </div>
    </template>
  </div>

  <script src="logger.js?v=3"></script>
  <script src="message_parser.js?v=3"></script>
  <script src="controller.js?v=3"></script>
  <script src="app.js?v=4"></script>
</body>
</html>
